<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #667eea;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            cursor: pointer;
        }

        .forgot {
            color: #667eea;
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .btn-cancel {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-circle"></i>
            <h1>Login</h1>
            <p>Silakan masuk ke akun Anda</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="text" id="username" placeholder="Username atau Email" autocomplete="username">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" autocomplete="current-password">
            </div>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="remember"> Ingat Saya
                </label>
                <a href="#" id="forgotLink" class="forgot">Lupa Password?</a>
            </div>

            <button type="submit" class="btn-login">Login</button>
            <button type="button" id="cancelBtn" class="btn-cancel">Batal</button>
        </form>

        <div id="message" class="message"></div>
    </div>

    <script>
        const validUsers = [
            { username: "admin", password: "admin123" },
            { username: "user", password: "user123" },
            { username: "demo", password: "demo123" }
        ];

        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheck = document.getElementById('remember');
        const messageDiv = document.getElementById('message');
        const loginForm = document.getElementById('loginForm');
        const cancelBtn = document.getElementById('cancelBtn');
        const forgotLink = document.getElementById('forgotLink');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                if (messageDiv.className === 'message ' + type) {
                    messageDiv.style.display = 'none';
                    messageDiv.className = 'message';
                }
            }, 3000);
            messageDiv.style.display = 'block';
        }

        function saveRememberMe(username) {
            if (rememberCheck.checked) {
                localStorage.setItem('rememberedUser', username);
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('rememberedUser');
                localStorage.removeItem('rememberMe');
            }
        }

        function loadRememberMe() {
            if (localStorage.getItem('rememberMe') === 'true') {
                const savedUser = localStorage.getItem('rememberedUser');
                if (savedUser) {
                    usernameInput.value = savedUser;
                    rememberCheck.checked = true;
                }
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showMessage('Harap isi semua field!', 'error');
                return;
            }

            const isValid = validUsers.some(user => 
                user.username === username && user.password === password
            );

            if (isValid) {
                saveRememberMe(username);
                showMessage(`Login berhasil! Selamat datang ${username} 🎉`, 'success');
                loginForm.reset();
                setTimeout(() => {
                    alert('Redirect ke dashboard...');
                }, 1000);
            } else {
                showMessage('Username atau password salah!', 'error');
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function resetForm() {
            usernameInput.value = '';
            passwordInput.value = '';
            rememberCheck.checked = false;
            messageDiv.style.display = 'none';
            usernameInput.focus();
        }

        function handleForgot(e) {
            e.preventDefault();
            showMessage('Reset link telah dikirim ke email Anda! 📧', 'success');
        }

        loginForm.addEventListener('submit', handleLogin);
        cancelBtn.addEventListener('click', resetForm);
        forgotLink.addEventListener('click', handleForgot);
        
        loadRememberMe();
        
        if (!usernameInput.value) {
            usernameInput.focus();
        }
    </script>
</body>
</html>
