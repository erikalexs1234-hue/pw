<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarnetKu Jepang Edition</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:
    linear-gradient(rgba(10,10,30,0.4), rgba(10,10,30,0.6)),
    url('tokyo%20japan.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  overflow:hidden;
}

/* HUJAN */
#rain{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
}

/* UI DI ATAS HUJAN */
.sidebar, .main, .login-box{
  position:relative;
  z-index:2;
}

/* LOGIN */
#loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:rgba(20,20,40,0.9);
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

.login-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f,#0ff);
  color:white;
}

/* DASHBOARD */
#dashboard{
  display:none;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:rgba(10,10,30,0.9);
  height:100%;
  position:fixed;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

.card{
  background:rgba(20,20,40,0.7);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input{
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
}

.blue{background:blue;color:white;}
.green{background:green;color:white;}

/* PC GRID */
.pc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.pc{
  padding:10px;
  background:#222;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.pc.active{
  background:cyan;
  color:black;
}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h2>🎮 WarnetKu</h2>
    <button onclick="show('booking')">Booking</button>
    <button onclick="show('kasir')">Kasir</button>
    <button onclick="show('karyawan')">Karyawan</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- BOOKING -->
    <div id="booking" class="card">
      <h3>Booking PC</h3>
      <input id="nama" placeholder="Nama">
      <input id="jam" type="time">
      <div class="pc-grid" id="pcList"></div>
      <button class="blue" onclick="booking()">Booking</button>
      <p id="notif"></p>
    </div>

    <!-- KASIR -->
    <div id="kasir" class="card" style="display:none;">
      <h3>Kasir</h3>
      <button class="green" onclick="bayar()">Bayar Semua</button>
    </div>

    <!-- KARYAWAN -->
    <div id="karyawan" class="card" style="display:none;">
      <h3>Data Karyawan</h3>
      <input id="namaKaryawan" placeholder="Nama Karyawan">
      <button class="blue" onclick="tambahKaryawan()">Tambah</button>
      <ul id="listKaryawan"></ul>
    </div>

  </div>

</div>

<script>
let selectedPC=null;
let harga=5000;

/* STORAGE */
let dataPC = JSON.parse(localStorage.getItem("pc")) || {};
let dataKaryawan = JSON.parse(localStorage.getItem("karyawan")) || [];

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="123"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    renderPC();
    renderKaryawan();
  }else{
    alert("Login gagal!");
  }
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* NAV */
function show(page){
  document.getElementById("booking").style.display="none";
  document.getElementById("kasir").style.display="none";
  document.getElementById("karyawan").style.display="none";
  document.getElementById(page).style.display="block";
}

/* PC SYSTEM */
let pcList=document.getElementById("pcList");

function renderPC(){
  pcList.innerHTML="";

  for(let i=1;i<=8;i++){
    let div=document.createElement("div");
    div.className="pc";

    let status = dataPC[i]?.status || "Kosong";

    div.innerHTML = `
      PC ${i}<br>
      <small>${status}</small><br>
      <small id="timer${i}"></small>
    `;

    if(status==="Dipakai"){
      div.classList.add("active");
      startTimer(i);
    }

    div.onclick=()=>{
      if(status==="Dipakai"){
        alert("PC sedang dipakai!");
        return;
      }

      document.querySelectorAll(".pc").forEach(p=>p.classList.remove("active"));
      div.classList.add("active");
      selectedPC=i;
    };

    pcList.appendChild(div);
  }
}

/* BOOKING */
function booking(){
  let nama=document.getElementById("nama").value;

  if(!nama || !selectedPC){
    alert("Lengkapi data!");
    return;
  }

  let start = new Date().getTime();

  dataPC[selectedPC]={
    nama,
    start,
    status:"Dipakai"
  };

  localStorage.setItem("pc", JSON.stringify(dataPC));

  renderPC();

  document.getElementById("notif").innerText=
    "Booking PC "+selectedPC+" berhasil";

  selectedPC=null;
}

/* TIMER */
function startTimer(pc){
  setInterval(()=>{
    if(!dataPC[pc]) return;

    let now = new Date().getTime();
    let diff = Math.floor((now - dataPC[pc].start)/1000);

    let jam = Math.floor(diff/3600);
    let menit = Math.floor((diff%3600)/60);
    let detik = diff%60;

    let el = document.getElementById("timer"+pc);
    if(el){
      el.innerText = jam+"j "+menit+"m "+detik+"s";
    }
  },1000);
}

/* KASIR */
function bayar(){
  let total=0;

  for(let pc in dataPC){
    let now = new Date().getTime();
    let durasi = (now - dataPC[pc].start)/3600000;

    total += Math.ceil(durasi) * harga;
  }

  alert("Total bayar: Rp "+total);

  dataPC={};
  localStorage.setItem("pc", JSON.stringify(dataPC));
  renderPC();
}

/* KARYAWAN */
function tambahKaryawan(){
  let nama=document.getElementById("namaKaryawan").value;
  if(!nama) return;

  dataKaryawan.push(nama);
  localStorage.setItem("karyawan", JSON.stringify(dataKaryawan));
  renderKaryawan();
  document.getElementById("namaKaryawan").value="";
}

function renderKaryawan(){
  let list=document.getElementById("listKaryawan");
  list.innerHTML="";

  dataKaryawan.forEach((k,i)=>{
    let li=document.createElement("li");
    li.innerText=k;

    li.onclick=()=>{
      dataKaryawan.splice(i,1);
      localStorage.setItem("karyawan", JSON.stringify(dataKaryawan));
      renderKaryawan();
    };

    list.appendChild(li);
  });
}

window.onload=()=>{
  renderPC();
  renderKaryawan();
};

/* HUJAN */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rainDrops = [];

for(let i=0;i<180;i++){
  rainDrops.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    length: Math.random()*20,
    speed: Math.random()*4+4
  });
}

function drawRain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="rgba(0,255,255,0.4)";
  ctx.lineWidth=1;

  for(let i=0;i<rainDrops.length;i++){
    let r = rainDrops[i];

    ctx.beginPath();
    ctx.moveTo(r.x,r.y);
    ctx.lineTo(r.x,r.y+r.length);
    ctx.stroke();

    r.y += r.speed;

    if(r.y > canvas.height){
      r.y = 0;
      r.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(drawRain);
}

drawRain();
</script>

</body>
</html>
```
