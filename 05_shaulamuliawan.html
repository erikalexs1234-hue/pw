<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Warnet System Pro</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
.sidebar{width:200px;position:fixed;height:100%;background:#020617;padding:20px}
.sidebar button{display:block;width:100%;margin:10px 0;padding:10px;background:#1e293b;color:white;border:none;cursor:pointer}
.content{margin-left:220px;padding:20px}
.box{background:#1e293b;padding:15px;margin:10px 0;border-radius:10px}
input,button{padding:8px;margin:5px}
.notif{position:fixed;top:20px;right:20px;background:cyan;color:black;padding:10px;border-radius:8px}
canvas{position:fixed;z-index:-1}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login Admin</h2>
  <input id="user" placeholder="Username"><br>
  <input id="pass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="sidebar">
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('booking')">Booking</button>
  <button onclick="show('karyawan')">Karyawan</button>
  <button onclick="show('member')">Member</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Statistik Warnet</h2>
  <div class="box">💰 Pendapatan Hari Ini: Rp <span id="todayIncome">0</span></div>
  <div class="box">🧾 Total Transaksi: <span id="totalTransaksi">0</span></div>
</div>

<!-- BOOKING -->
<div id="booking" style="display:none">
  <h2>Booking PC</h2>
  <div id="listPC"></div>
</div>

<!-- KARYAWAN -->
<div id="karyawan" style="display:none">
  <h2>Karyawan</h2>
  <input id="namaKaryawan" placeholder="Nama">
  <button onclick="tambahKaryawan()">Tambah</button>
  <div id="listKaryawan"></div>
</div>

<!-- MEMBER -->
<div id="member" style="display:none">
  <h2>Member Warnet</h2>
  <input id="namaMember" placeholder="Nama Member">
  <button onclick="tambahMember()">Tambah</button>
  <div id="listMember"></div>
</div>

</div>
</div>

<script>
let dataPC = JSON.parse(localStorage.getItem("pc")) || {};
let karyawan = JSON.parse(localStorage.getItem("karyawan")) || [];
let transaksi = JSON.parse(localStorage.getItem("trx")) || [];
let members = JSON.parse(localStorage.getItem("member")) || [];
let admins = JSON.parse(localStorage.getItem("admin")) || [
  {user:"admin",pass:"123"},
  {user:"owner",pass:"123"}
];

let currentAdmin = null;
let harga = 5000;
let timers = {};

/* LOGIN MULTI ADMIN */
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  let found = admins.find(a=>a.user===u && a.pass===p);

  if(found){
    currentAdmin = u;
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";

    renderPC();
    renderKaryawan();
    renderMember();
    renderDashboard();
  }else{
    alert("Login gagal!");
  }
}

/* LOGOUT */
function logout(){
  currentAdmin = null;
  document.getElementById("app").style.display="none";
  document.getElementById("loginPage").style.display="block";
}

/* NAV */
function show(menu){
  ["dashboard","booking","karyawan","member"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(menu).style.display="block";
}

/* BOOKING */
function renderPC(){
  let list = document.getElementById("listPC");
  list.innerHTML="";

  for(let i=1;i<=5;i++){
    let pc = dataPC[i];
    let div = document.createElement("div");
    div.className="box";

    if(pc){
      div.innerHTML=`
        PC ${i} - Dipakai<br>
        <span id="timer${i}"></span><br>
        <button onclick="stopPC(${i})">Stop</button>
      `;
      startTimer(i);
    }else{
      div.innerHTML=`
        PC ${i} - Kosong<br>
        Durasi: <input id="durasi${i}" type="number"><br>
        <button onclick="bookingPC(${i})">Booking</button>
      `;
    }

    list.appendChild(div);
  }
}

function bookingPC(pc){
  let d = document.getElementById("durasi"+pc).value;
  if(!d) return alert("Isi durasi!");

  dataPC[pc]={ start:Date.now(), durasi:parseInt(d) };
  localStorage.setItem("pc", JSON.stringify(dataPC));
  renderPC();
}

/* TIMER */
function startTimer(pc){
  if(timers[pc]) clearInterval(timers[pc]);

  timers[pc]=setInterval(()=>{
    let data = dataPC[pc];
    if(!data) return clearInterval(timers[pc]);

    let elapsed = Math.floor((Date.now()-data.start)/1000);
    let total = data.durasi*3600;
    let sisa = total - elapsed;

    if(sisa<=0){
      stopPC(pc);
      showNotif("PC "+pc+" waktu habis!");
      return;
    }

    let el = document.getElementById("timer"+pc);
    if(el) el.innerText = Math.floor(elapsed/60)+"m "+(elapsed%60)+"s";

  },1000);
}

/* STOP */
function stopPC(pc){
  let data = dataPC[pc];
  if(!data) return;

  let totalBayar = data.durasi * harga;

  transaksi.push({
    tanggal:new Date().toLocaleDateString(),
    total:totalBayar,
    admin: currentAdmin
  });

  localStorage.setItem("trx", JSON.stringify(transaksi));

  delete dataPC[pc];
  localStorage.setItem("pc", JSON.stringify(dataPC));

  if(timers[pc]) clearInterval(timers[pc]);

  alert("Total bayar: Rp "+totalBayar);

  renderPC();
  renderDashboard();
}

/* KARYAWAN */
function tambahKaryawan(){
  let nama = document.getElementById("namaKaryawan").value;
  if(!nama) return;

  karyawan.push(nama);
  localStorage.setItem("karyawan", JSON.stringify(karyawan));
  renderKaryawan();
}

function renderKaryawan(){
  let list = document.getElementById("listKaryawan");
  list.innerHTML="";
  karyawan.forEach((k,i)=>{
    let div=document.createElement("div");
    div.className="box";
    div.innerHTML=`${k} <button onclick="hapusKaryawan(${i})">Hapus</button>`;
    list.appendChild(div);
  });
}

function hapusKaryawan(i){
  karyawan.splice(i,1);
  localStorage.setItem("karyawan", JSON.stringify(karyawan));
  renderKaryawan();
}

/* MEMBER SYSTEM */
function tambahMember(){
  let nama = document.getElementById("namaMember").value;
  if(!nama) return;

  members.push({nama:nama, saldo:0});
  localStorage.setItem("member", JSON.stringify(members));
  renderMember();
}

function renderMember(){
  let list = document.getElementById("listMember");
  list.innerHTML="";

  members.forEach((m,i)=>{
    let div=document.createElement("div");
    div.className="box";
    div.innerHTML=`
      ${m.nama} - Saldo: Rp ${m.saldo}
      <button onclick="topup(${i})">Top Up</button>
      <button onclick="hapusMember(${i})">Hapus</button>
    `;
    list.appendChild(div);
  });
}

function topup(i){
  let nominal = prompt("Top up berapa?");
  if(!nominal) return;

  members[i].saldo += parseInt(nominal);
  localStorage.setItem("member", JSON.stringify(members));
  renderMember();
}

function hapusMember(i){
  members.splice(i,1);
  localStorage.setItem("member", JSON.stringify(members));
  renderMember();
}

/* DASHBOARD */
function renderDashboard(){
  let today = new Date().toLocaleDateString();

  let todayData = transaksi.filter(t=>t.tanggal==today);
  let total = todayData.reduce((a,b)=>a+b.total,0);

  document.getElementById("todayIncome").innerText=total;
  document.getElementById("totalTransaksi").innerText=transaksi.length;
}

/* NOTIF */
function showNotif(text){
  let n=document.createElement("div");
  n.className="notif";
  n.innerText=text;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),3000);
}

/* HUJAN */
let c=document.getElementById("rain");
let ctx=c.getContext("2d");
c.height=window.innerHeight;
c.width=window.innerWidth;

let rain=[];
for(let i=0;i<100;i++){
  rain.push({x:Math.random()*c.width,y:Math.random()*c.height,l:Math.random()*20});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="cyan";
  rain.forEach(r=>{
    ctx.fillRect(r.x,r.y,2,r.l);
    r.y+=10;
    if(r.y>c.height) r.y=0;
  });
}
setInterval(draw,50);
</script>

</body>
</html>
