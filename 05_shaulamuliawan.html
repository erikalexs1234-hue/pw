```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WarnetKu Pro Full System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:white;}

#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;}
.login-box{background:rgba(255,255,255,0.05);padding:30px;border-radius:15px;width:300px;}

input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px;}

.btn{padding:10px;border:none;border-radius:8px;width:100%;cursor:pointer;}
.blue{background:#0ea5e9;}
.green{background:#22c55e;}

#app{display:none;}

.sidebar{
  width:220px;height:100vh;background:#0f172a;
  position:fixed;padding:20px;
}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
.logo img{width:50px;filter:drop-shadow(0 0 10px cyan);}

.menu div{
  padding:10px;border-radius:8px;cursor:pointer;
}
.menu div:hover{background:rgba(255,255,255,0.1);}

.content{margin-left:240px;padding:20px;}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;border-radius:15px;margin-bottom:20px;
}

.pc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;margin-top:10px;
}

.pc{padding:15px;text-align:center;border-radius:10px;cursor:pointer;}
.available{background:#16a34a;}
.booked{background:#dc2626;}
.selected{outline:3px solid cyan;}

.fade{animation:fade 0.5s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password">
    <button class="btn blue" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    <b>WarnetKu</b>
  </div>

  <div class="menu">
    <div onclick="showPage('booking')">Booking</div>
    <div onclick="showPage('kasir')">Kasir</div>
    <div onclick="showPage('laporan')">Laporan</div>
    <div onclick="logout()">Logout</div>
  </div>
</div>

<div class="content">

<!-- BOOKING -->
<div id="bookingPage" class="card fade">
  <h3>Booking PC</h3>

  <input id="nama" placeholder="Nama">
  <input id="durasi" type="number" placeholder="Durasi (jam)">
  <p>Harga / jam: Rp 5.000</p>
  <p id="totalHarga">Total: Rp 0</p>

  <div class="pc-grid" id="pcList"></div>

  <button class="btn blue" onclick="booking()">Booking</button>
</div>

<!-- KASIR -->
<div id="kasirPage" class="card" style="display:none;">
  <h3>Kasir / Transaksi</h3>
  <ul id="transaksiList"></ul>
  <h4 id="totalUang">Total: Rp 0</h4>
</div>

<!-- LAPORAN -->
<div id="laporanPage" class="card" style="display:none;">
  <h3>Laporan Keuangan</h3>
  <p id="laporanText"></p>
</div>

</div>
</div>

<script>
let selectedPC=null;
let bookings=JSON.parse(localStorage.getItem("bookings"))||{};
let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[];

const hargaPerJam=5000;

/* LOGIN */
function login(){
  loginPage.style.display="none";
  app.style.display="block";
}

/* NAV */
function showPage(p){
  bookingPage.style.display="none";
  kasirPage.style.display="none";
  laporanPage.style.display="none";

  if(p==="booking") bookingPage.style.display="block";
  if(p==="kasir") kasirPage.style.display="block";
  if(p==="laporan") laporanPage.style.display="block";
}

/* HITUNG */
durasi.oninput=()=>{
  totalHarga.innerText="Total: Rp "+(durasi.value*hargaPerJam||0);
}

/* RENDER PC */
function renderPC(){
  pcList.innerHTML="";
  for(let i=1;i<=12;i++){
    let d=bookings[i];
    let div=document.createElement("div");

    div.className="pc "+(d?"booked":"available");

    if(d){
      div.innerHTML=`PC ${i}<br>${d.nama}<br>${d.sisa}s`;
    }else{
      div.innerHTML="PC "+i;
    }

    div.onclick=()=>{
      selectedPC=i;
      renderPC();
    }

    if(selectedPC===i) div.classList.add("selected");

    pcList.appendChild(div);
  }
}

/* BOOKING */
function booking(){
  let namaVal=nama.value;
  let durasiVal=parseInt(durasi.value);

  if(!selectedPC) return alert("Pilih PC!");
  if(!durasiVal) return alert("Isi durasi!");

  let total=durasiVal*hargaPerJam;
  let detik=durasiVal*60;

  bookings[selectedPC]={nama:namaVal,sisa:detik,total:total};

  startTimer(selectedPC);

  nama.value="";
  durasi.value="";
  totalHarga.innerText="Total: Rp 0";
  selectedPC=null;

  save();
  renderPC();
}

/* TIMER */
function startTimer(pc){
  let interval=setInterval(()=>{
    if(!bookings[pc]) return clearInterval(interval);

    bookings[pc].sisa--;

    if(bookings[pc].sisa<=0){
      alert("Waktu habis PC "+pc);

      // MASUK KE KASIR
      transaksi.push({
        nama:bookings[pc].nama,
        total:bookings[pc].total
      });

      delete bookings[pc];
      clearInterval(interval);
      renderKasir();
      renderLaporan();
    }

    save();
    renderPC();
  },1000);
}

/* KASIR */
function renderKasir(){
  transaksiList.innerHTML="";
  let total=0;

  transaksi.forEach(t=>{
    let li=document.createElement("li");
    li.innerText=`${t.nama} - Rp ${t.total}`;
    transaksiList.appendChild(li);
    total+=t.total;
  });

  totalUang.innerText="Total: Rp "+total;
}

/* LAPORAN */
function renderLaporan(){
  let total=transaksi.reduce((a,b)=>a+b.total,0);
  laporanText.innerText="Total pemasukan hari ini: Rp "+total;
}

/* SAVE */
function save(){
  localStorage.setItem("bookings",JSON.stringify(bookings));
  localStorage.setItem("transaksi",JSON.stringify(transaksi));
}

/* INIT */
renderPC();
renderKasir();
renderLaporan();
</script>

</body>
</html>
