```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WarnetKu Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body { background:#020617; color:white; }

/* LOGIN */
#loginPage { height:100vh; display:flex; justify-content:center; align-items:center; }
.login-box {
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:15px;
  width:300px;
}
input { width:100%; padding:10px; margin:8px 0; border:none; border-radius:8px; }

.btn {
  padding:10px; border:none; border-radius:8px;
  width:100%; cursor:pointer;
}
.blue{background:#0ea5e9;}
.green{background:#22c55e;}
.red{background:#ef4444;}

#app{display:none;}

/* SIDEBAR */
.sidebar {
  width:220px; height:100vh;
  background:#0f172a; position:fixed; padding:20px;
}
.logo { display:flex; align-items:center; gap:10px; margin-bottom:30px; }
.logo img { width:50px; filter:drop-shadow(0 0 10px cyan); }

.menu div {
  padding:10px; border-radius:8px; cursor:pointer;
}
.menu div:hover { background:rgba(255,255,255,0.1); }

/* CONTENT */
.content { margin-left:240px; padding:20px; }

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* PC GRID */
.pc-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.pc {
  padding:15px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}
.pc:hover { transform:scale(1.05); }

.available { background:#16a34a; }
.booked { background:#dc2626; }
.selected { outline:3px solid cyan; }

/* ANIMASI */
.fade { animation:fade 0.5s; }
@keyframes fade { from{opacity:0;} to{opacity:1;} }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn blue" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    <b>WarnetKu</b>
  </div>

  <div class="menu">
    <div onclick="showPage('booking')">Booking</div>
    <div onclick="logout()">Logout</div>
  </div>
</div>

<div class="content">

<div id="bookingPage" class="card fade">
  <h3>Booking PC</h3>

  <input id="nama" placeholder="Nama">
  <input id="nim" placeholder="NIM">
  <input id="jurusan" placeholder="Jurusan">

  <div class="pc-grid" id="pcList"></div>

  <button class="btn blue" onclick="booking()">Booking</button>

  <h4>QR</h4>
  <img id="qr">
</div>

</div>
</div>

<script>
let selectedPC = null;
let bookings = JSON.parse(localStorage.getItem("bookings")) || {};

/* LOGIN */
function login(){
  loginPage.style.display="none";
  app.style.display="block";
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* RENDER PC */
function renderPC(){
  pcList.innerHTML="";
  for(let i=1;i<=12;i++){
    let div=document.createElement("div");
    div.className="pc "+(bookings[i]?"booked":"available");

    if(bookings[i]){
      div.innerHTML="PC "+i+"<br>"+bookings[i];
    }else{
      div.innerHTML="PC "+i;
    }

    div.onclick=()=>{
      selectedPC=i;
      renderPC();
    }

    if(selectedPC===i){
      div.classList.add("selected");
    }

    pcList.appendChild(div);
  }
}

/* BOOKING + RESET */
function booking(){
  let namaVal = nama.value;
  let nimVal = nim.value;
  let jurusanVal = jurusan.value;

  if(!selectedPC) return alert("Pilih PC!");

  bookings[selectedPC]=namaVal;
  localStorage.setItem("bookings",JSON.stringify(bookings));

  // QR
  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+namaVal;

  // 🔥 RESET FORM
  nama.value="";
  nim.value="";
  jurusan.value="";
  selectedPC=null;

  renderPC();
}

/* INIT */
renderPC();
</script>

</body>
</html>
```
