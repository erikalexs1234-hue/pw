<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WarnetKu Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

/* BODY */
body {
  background: #020617;
  color: white;
}

/* LOGIN */
#loginPage {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  backdrop-filter: blur(10px);
  animation: fade 1s;
}

.login-box input {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.btn {
  padding: 10px;
  border: none;
  border-radius: 8px;
  width: 100%;
  cursor: pointer;
}

.blue { background: #0ea5e9; }
.green { background: #22c55e; }
.red { background: #ef4444; }

/* APP */
#app {
  display: none;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #0f172a;
  position: fixed;
  padding: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
}

.logo img {
  width: 50px;
  filter: drop-shadow(0 0 10px cyan);
}

.menu div {
  padding: 10px;
  cursor: pointer;
  border-radius: 8px;
}

.menu div:hover {
  background: rgba(255,255,255,0.1);
}

/* CONTENT */
.content {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* PC GRID */
.pc-grid {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
}

.pc {
  padding: 15px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
}

.available { background: #16a34a; }
.booked { background: #dc2626; }

/* ANIMATION */
@keyframes fade {
  from {opacity:0;}
  to {opacity:1;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn blue" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    <b>WarnetKu</b>
  </div>

  <div class="menu">
    <div onclick="showPage('booking')">Booking</div>
    <div onclick="showPage('absen')">Absensi</div>
    <div onclick="logout()">Logout</div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- BOOKING -->
<div id="bookingPage" class="card">
  <h3>Booking PC</h3>
  <input id="nama" placeholder="Nama"><br><br>
  <input id="nim" placeholder="NIM"><br><br>
  <input id="jurusan" placeholder="Jurusan"><br><br>

  <div class="pc-grid" id="pcList"></div>

  <button class="btn blue" onclick="booking()">Booking</button>

  <h4>QR</h4>
  <img id="qr">
</div>

<!-- ABSEN -->
<div id="absenPage" class="card" style="display:none;">
  <h3>Absensi</h3>
  <input id="namaKaryawan" placeholder="Nama"><br><br>
  <button class="btn green" onclick="checkin()">Check-in</button>
  <button class="btn red" onclick="checkout()">Check-out</button>

  <ul id="absenList"></ul>
</div>

</div>
</div>

<script>
let role = "";
let selectedPC = null;
let bookings = JSON.parse(localStorage.getItem("bookings")) || {};
let absen = JSON.parse(localStorage.getItem("absen")) || [];

/* LOGIN */
function login() {
  let u = user.value;
  let p = pass.value;

  if (u === "admin" && p === "admin") role = "admin";
  else role = "user";

  loginPage.style.display = "none";
  app.style.display = "block";
}

/* LOGOUT */
function logout() {
  location.reload();
}

/* PAGE SWITCH */
function showPage(page) {
  bookingPage.style.display = "none";
  absenPage.style.display = "none";

  if (page === "booking") bookingPage.style.display = "block";
  if (page === "absen") absenPage.style.display = "block";
}

/* PC */
function renderPC() {
  pcList.innerHTML = "";
  for (let i = 1; i <= 12; i++) {
    let div = document.createElement("div");
    div.className = "pc " + (bookings[i] ? "booked" : "available");
    div.innerHTML = "PC " + i;
    div.onclick = () => selectedPC = i;
    pcList.appendChild(div);
  }
}

/* BOOKING */
function booking() {
  if (!selectedPC) return alert("Pilih PC!");

  bookings[selectedPC] = nama.value;
  localStorage.setItem("bookings", JSON.stringify(bookings));

  qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + nama.value;
  renderPC();
}

/* ABSEN */
function checkin() {
  absen.push(namaKaryawan.value + " (IN)");
  saveAbsen();
}

function checkout() {
  absen.push(namaKaryawan.value + " (OUT)");
  saveAbsen();
}

function saveAbsen() {
  localStorage.setItem("absen", JSON.stringify(absen));
  renderAbsen();
}

function renderAbsen() {
  absenList.innerHTML = "";
  absen.forEach(a => {
    let li = document.createElement("li");
    li.innerText = a;
    absenList.appendChild(li);
  });
}

renderPC();
renderAbsen();
</script>

</body>
</html>
```
