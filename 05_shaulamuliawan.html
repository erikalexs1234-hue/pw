<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarnetKu Jepang Edition</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:
    linear-gradient(rgba(10,10,30,0.4), rgba(10,10,30,0.6)),
    url('tokyo%20japan.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  overflow:hidden;
}

#rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;}
.sidebar,.main,.login-box{position:relative;z-index:2;}

#loginPage{display:flex;justify-content:center;align-items:center;height:100vh;}

.login-box{background:rgba(20,20,40,0.9);padding:30px;border-radius:15px;width:300px;text-align:center;}
.login-box input{width:100%;margin:10px 0;padding:10px;border:none;border-radius:8px;}
.login-box button{width:100%;padding:10px;border:none;border-radius:8px;background:linear-gradient(45deg,#00f,#0ff);color:white;}

#dashboard{display:none;height:100vh;}

.sidebar{width:220px;background:rgba(10,10,30,0.9);height:100%;position:fixed;padding:20px;}
.sidebar button{width:100%;margin:10px 0;padding:10px;border:none;border-radius:8px;background:#111;color:white;}

.main{margin-left:240px;padding:20px;}
.card{background:rgba(20,20,40,0.7);padding:20px;border-radius:12px;margin-bottom:20px;}

input,select{display:block;margin:10px 0;padding:10px;width:100%;border:none;border-radius:8px;}
button{padding:10px;border:none;border-radius:8px;}
.blue{background:blue;color:white;}
.green{background:green;color:white;}

.pc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.pc{padding:10px;background:#222;text-align:center;border-radius:8px;cursor:pointer;}
.pc.active{background:cyan;color:black;}

#strukBox{background:black;padding:15px;margin-top:10px;border-radius:10px;font-size:14px;}
</style>
</head>

<body>

<canvas id="rain"></canvas>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="sidebar">
    <h2>🎮 WarnetKu</h2>
    <button onclick="show('booking')">Booking</button>
    <button onclick="show('kasir')">Kasir</button>
    <button onclick="show('karyawan')">Karyawan</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- BOOKING -->
    <div id="booking" class="card">
      <h3>Booking PC</h3>
      <input id="nama" placeholder="Nama">
      <select id="durasi">
        <option value="1">1 Jam</option>
        <option value="2">2 Jam</option>
        <option value="3">3 Jam</option>
        <option value="4">4 Jam</option>
        <option value="5">5 Jam</option>
      </select>
      <div class="pc-grid" id="pcList"></div>
      <button class="blue" onclick="booking()">Booking</button>
      <p id="notif"></p>
    </div>

    <!-- KASIR -->
    <div id="kasir" class="card" style="display:none;">
      <h3>Kasir</h3>
      <button class="green" onclick="bayar()">Bayar Semua</button>
      <div id="strukBox"></div>
    </div>

    <!-- KARYAWAN -->
    <div id="karyawan" class="card" style="display:none;">
      <h3>Data Karyawan</h3>
      <input id="namaKaryawan" placeholder="Nama Karyawan">
      <button class="blue" onclick="tambahKaryawan()">Tambah</button>
      <ul id="listKaryawan"></ul>
    </div>

  </div>
</div>

<script>
let selectedPC=null;
let harga=5000;

let dataPC = JSON.parse(localStorage.getItem("pc")) || {};
let dataKaryawan = JSON.parse(localStorage.getItem("karyawan")) || [];

/* LOGIN */
function login(){
  if(user.value==="admin" && pass.value==="123"){
    loginPage.style.display="none";
    dashboard.style.display="block";
    renderPC();
    renderKaryawan();
  }else alert("Login gagal!");
}

function logout(){location.reload();}

function show(page){
  booking.style.display="none";
  kasir.style.display="none";
  karyawan.style.display="none";
  document.getElementById(page).style.display="block";
}

/* PC */
let pcList=document.getElementById("pcList");

function renderPC(){
  pcList.innerHTML="";
  for(let i=1;i<=8;i++){
    let div=document.createElement("div");
    let data=dataPC[i];
    let status=data?.status||"Kosong";

    div.className="pc";
    div.innerHTML=`PC ${i}<br><small>${status}</small><br><small id="timer${i}"></small>`;

    if(status==="Dipakai"){
      div.classList.add("active");
      startTimer(i);
    }

    div.onclick=()=>{
      if(status==="Dipakai") return alert("Sedang dipakai");
      document.querySelectorAll(".pc").forEach(p=>p.classList.remove("active"));
      div.classList.add("active");
      selectedPC=i;
    };

    pcList.appendChild(div);
  }
}

/* BOOKING */
function booking(){
  let nama=nama.value;
  let durasi=parseInt(document.getElementById("durasi").value);

  if(!nama||!selectedPC) return alert("Lengkapi data");

  dataPC[selectedPC]={
    nama,
    start:Date.now(),
    durasi,
    status:"Dipakai"
  };

  localStorage.setItem("pc",JSON.stringify(dataPC));
  renderPC();
  notif.innerText="Booking PC "+selectedPC+" "+durasi+" jam";
  selectedPC=null;
}

/* TIMER + AUTO STOP */
function startTimer(pc){
  let interval = setInterval(()=>{
    if(!dataPC[pc]){
      clearInterval(interval);
      return;
    }

    let data=dataPC[pc];
    let elapsed = Math.floor((Date.now()-data.start)/1000);
    let total = data.durasi*3600;

    let el=document.getElementById("timer"+pc);

    if(elapsed >= total){
      if(el) el.innerText="Waktu habis";

      showNotif("PC "+pc+" waktu habis!");

      delete dataPC[pc];
      localStorage.setItem("pc",JSON.stringify(dataPC));
      renderPC();

      clearInterval(interval);
      return;
    }

    let h=Math.floor(elapsed/3600);
    let m=Math.floor((elapsed%3600)/60);
    let d=elapsed%60;

    if(el) el.innerText=h+"j "+m+"m "+d+"s";

  },1000);
}

/* NOTIF */
function showNotif(text){
  let div=document.createElement("div");
  div.innerText=text;

  div.style.position="fixed";
  div.style.top="20px";
  div.style.right="20px";
  div.style.background="red";
  div.style.padding="10px 20px";
  div.style.borderRadius="10px";
  div.style.zIndex="9999";

  document.body.appendChild(div);

  let audio=new Audio("https://www.soundjay.com/buttons/beep-01a.mp3");
  audio.play();

  setTimeout(()=>div.remove(),3000);
}

/* KASIR */
function bayar(){
  let total=0;
  let struk="=== STRUK WARNET ===<br>";

  for(let pc in dataPC){
    let d=dataPC[pc];
    let hargaPC=d.durasi*harga;
    total+=hargaPC;

    struk+=`PC ${pc} - ${d.nama}<br>Durasi: ${d.durasi} jam<br>Rp ${hargaPC}<br><br>`;
  }

  struk+="Total: Rp "+total;

  strukBox.innerHTML=struk;

  dataPC={};
  localStorage.setItem("pc","{}");
  renderPC();
}

/* KARYAWAN */
function tambahKaryawan(){
  if(!namaKaryawan.value) return;
  dataKaryawan.push(namaKaryawan.value);
  localStorage.setItem("karyawan",JSON.stringify(dataKaryawan));
  renderKaryawan();
  namaKaryawan.value="";
}

function renderKaryawan(){
  listKaryawan.innerHTML="";
  dataKaryawan.forEach((k,i)=>{
    let li=document.createElement("li");
    li.innerText=k;
    li.onclick=()=>{
      dataKaryawan.splice(i,1);
      localStorage.setItem("karyawan",JSON.stringify(dataKaryawan));
      renderKaryawan();
    };
    listKaryawan.appendChild(li);
  });
}

window.onload=()=>{
  renderPC();
  renderKaryawan();
};

/* HUJAN */
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let rain=[];
for(let i=0;i<180;i++){
  rain.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,l:Math.random()*20,s:Math.random()*4+4});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="rgba(0,255,255,0.4)";
  rain.forEach(r=>{
    ctx.beginPath();
    ctx.moveTo(r.x,r.y);
    ctx.lineTo(r.x,r.y+r.l);
    ctx.stroke();
    r.y+=r.s;
    if(r.y>canvas.height){r.y=0;r.x=Math.random()*canvas.width;}
  });
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
```
