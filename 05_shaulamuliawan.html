<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarnetKu Jepang Edition</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:
    linear-gradient(rgba(10,10,30,0.4), rgba(10,10,30,0.6)),
    url('tokyo%20japan.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
}


/* LOGIN */
#loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  animation:fadeIn 1s;
}

.login-box{
  background:rgba(20,20,40,0.9);
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

.login-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f,#0ff);
  color:white;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{
  display:none;
  height:100vh;
  animation:fadeIn 1s;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:rgba(10,10,30,0.9);
  height:100%;
  position:fixed;
  padding:20px;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

.main{
  margin-left:240px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(20,20,40,0.7);
  backdrop-filter: blur(10px);
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

input{
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.blue{background:blue;color:white;}
.green{background:green;color:white;}
.red{background:red;color:white;}

/* PC GRID */
.pc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.pc{
  padding:10px;
  background:#222;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.pc.active{background:cyan;color:black;}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes fadeInUp{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>ログイン (Login)</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h2>🎮 WarnetKu</h2>
    <button onclick="show('booking')">Booking</button>
    <button onclick="show('kasir')">Kasir</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- BOOKING -->
    <div id="booking" class="card">
      <h3>Booking PC</h3>
      <input id="nama" placeholder="Nama">
      <input id="jam" type="time">

      <div class="pc-grid" id="pcList"></div>

      <button class="blue" onclick="booking()">Booking</button>
      <p id="notif"></p>
    </div>

    <!-- KASIR -->
    <div id="kasir" class="card" style="display:none;">
      <h3>Kasir</h3>
      <p>Total: Rp <span id="total">0</span></p>
      <button class="green" onclick="bayar()">Bayar</button>
    </div>

  </div>

</div>

<script>
let selectedPC=null;
let harga=5000;
let total=0;

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="123"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
  }else{
    alert("Login gagal!");
  }
}

/* LOGOUT */
function logout(){
  location.reload();
}

/* NAV */
function show(page){
  document.getElementById("booking").style.display="none";
  document.getElementById("kasir").style.display="none";
  document.getElementById(page).style.display="block";
}

/* PC LIST */
let pcList=document.getElementById("pcList");
for(let i=1;i<=8;i++){
  let div=document.createElement("div");
  div.innerText="PC "+i;
  div.className="pc";
  div.onclick=()=>{
    document.querySelectorAll(".pc").forEach(p=>p.classList.remove("active"));
    div.classList.add("active");
    selectedPC=i;
  };
  pcList.appendChild(div);
}

/* BOOKING */
function booking(){
  let nama=document.getElementById("nama").value;

  if(!nama || !selectedPC){
    alert("Lengkapi data!");
    return;
  }

  total += harga;

  document.getElementById("notif").innerText=
    "Booking berhasil PC "+selectedPC+" | +Rp"+harga;

  document.getElementById("total").innerText=total;

  /* RESET */
  document.getElementById("nama").value="";
  selectedPC=null;
  document.querySelectorAll(".pc").forEach(p=>p.classList.remove("active"));
}

/* BAYAR */
function bayar(){
  alert("Pembayaran berhasil!");
  total=0;
  document.getElementById("total").innerText=0;
}
</script>

</body>
</html>
```
