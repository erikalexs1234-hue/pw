<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Warnet Booking System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("tokyo japan.jpg") no-repeat center/cover;
  color:white;
}

/* FIX ANIMASI */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
  pointer-events:none;
}

/* LOGIN */
.login{
  position:relative;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
}

/* DASHBOARD */
.dashboard{
  display:none;
}

.sidebar{
  position:fixed;
  width:200px;
  height:100%;
  background:rgba(0,0,0,0.7);
  padding:20px;
  z-index:10;
}

.sidebar button{
  display:block;
  width:100%;
  margin:10px 0;
}

.main{
  margin-left:220px;
  padding:20px;
  position:relative;
  z-index:10;
}

.pc{
  background:rgba(255,255,255,0.1);
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.notif{
  position:fixed;
  top:20px;
  right:20px;
  background:red;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- ANIMASI HUJAN -->
<canvas id="rain"></canvas>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="login-box">
    <h2>Login Warnet</h2>
    <input id="user" placeholder="username"><br><br>
    <input id="pass" type="password" placeholder="password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="app">

  <div class="sidebar">
    <h3>Menu</h3>
    <button onclick="show('booking')">Booking</button>
    <button onclick="show('kasir')">Kasir</button>
  </div>

  <div class="main">

    <!-- BOOKING -->
    <div id="booking">
      <h2>Booking PC</h2>
      <div id="listPC"></div>
    </div>

    <!-- KASIR -->
    <div id="kasir" style="display:none">
      <h2>Kasir</h2>
      <div id="laporan"></div>
    </div>

  </div>
</div>

<script>
let dataPC = JSON.parse(localStorage.getItem("pc")) || {};
let harga = 5000;

/* LOGIN */
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u && p){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    renderPC();
  }else{
    alert("Isi dulu!");
  }
}

/* NAVIGASI */
function show(menu){
  document.getElementById("booking").style.display="none";
  document.getElementById("kasir").style.display="none";

  document.getElementById(menu).style.display="block";
}

/* RENDER PC */
function renderPC(){
  let el = document.getElementById("listPC");
  el.innerHTML="";

  for(let i=1;i<=5;i++){
    let pc = dataPC[i];

    let div = document.createElement("div");
    div.className="pc";

    if(pc){
      div.innerHTML=`
        PC ${i} - Dipakai<br>
        <span id="timer${i}"></span><br>
        <button onclick="stopPC(${i})">Stop</button>
      `;
      startTimer(i);
    }else{
      div.innerHTML=`
        PC ${i} - Kosong<br>
        Durasi (jam): <input id="durasi${i}" type="number"><br>
        <button onclick="booking(${i})">Booking</button>
      `;
    }

    el.appendChild(div);
  }
}

/* BOOKING */
function booking(pc){
  let d = document.getElementById("durasi"+pc).value;

  if(!d) return alert("Isi durasi!");

  dataPC[pc]={
    start:Date.now(),
    durasi:parseInt(d)
  };

  localStorage.setItem("pc", JSON.stringify(dataPC));
  renderPC();
}

/* TIMER */
function startTimer(pc){
  let interval = setInterval(()=>{
    if(!dataPC[pc]){
      clearInterval(interval);
      return;
    }

    let data = dataPC[pc];
    let now = Date.now();

    let elapsed = Math.floor((now-data.start)/1000);
    let total = data.durasi*3600;
    let sisa = total - elapsed;

    let el = document.getElementById("timer"+pc);

    if(sisa <= 0){
      showNotif("PC "+pc+" waktu habis!");

      delete dataPC[pc];
      localStorage.setItem("pc", JSON.stringify(dataPC));

      renderPC();
      clearInterval(interval);
      return;
    }

    let m = Math.floor(elapsed/60);
    let s = elapsed%60;

    if(el) el.innerText = m+"m "+s+"s";

  },1000);
}

/* STOP */
function stopPC(pc){
  let data = dataPC[pc];

  let totalJam = data.durasi;
  let totalBayar = totalJam * harga;

  alert("Total bayar: Rp "+totalBayar);

  delete dataPC[pc];
  localStorage.setItem("pc", JSON.stringify(dataPC));

  renderPC();
}

/* NOTIF */
function showNotif(text){
  let n = document.createElement("div");
  n.className="notif";
  n.innerText=text;

  document.body.appendChild(n);

  let audio = new Audio("https://www.soundjay.com/buttons/beep-01a.mp3");
  audio.play();

  setTimeout(()=>n.remove(),3000);
}

/* ANIMASI HUJAN */
let c = document.getElementById("rain");
let ctx = c.getContext("2d");

c.height = window.innerHeight;
c.width = window.innerWidth;

let rain = [];

for(let i=0;i<100;i++){
  rain.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    l:Math.random()*20
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  ctx.fillStyle="cyan";

  rain.forEach(r=>{
    ctx.fillRect(r.x,r.y,2,r.l);
    r.y += 10;

    if(r.y > c.height){
      r.y = 0;
    }
  });
}

setInterval(draw,50);
</script>

</body>
</html>
