```html
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WarnetKu Jepang Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

/* ✅ BACKGROUND DARI FILE GITHUB KAMU */
body{
  background:
    linear-gradient(rgba(5,5,20,0.8), rgba(5,5,20,0.95)),
   url('tokyo-japan.jpg')
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
}

/* LOGIN */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:15px;
  width:300px;
}

#app{display:none;}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:rgba(15,23,42,0.8);
  backdrop-filter:blur(12px);
  position:fixed;
  padding:20px;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:30px;
}

.logo img{
  width:50px;
  filter:drop-shadow(0 0 15px #ff00ff);
}

.menu div{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.menu div:hover{
  background:linear-gradient(90deg,#ff00ff,#00f0ff);
  box-shadow:0 0 10px #ff00ff;
}

/* CONTENT */
.content{
  margin-left:240px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(255,0,255,0.2);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BUTTON */
.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.blue{background:linear-gradient(90deg,#00f0ff,#6366f1);}
.green{background:linear-gradient(90deg,#22c55e,#4ade80);}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px cyan;
}

/* PC GRID */
.pc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:10px;
}

.pc{
  padding:15px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.available{
  background:linear-gradient(45deg,#22c55e,#16a34a);
  box-shadow:0 0 10px #22c55e;
}

.booked{
  background:linear-gradient(45deg,#ef4444,#dc2626);
  box-shadow:0 0 10px #ef4444;
}

.selected{
  outline:3px solid #00f0ff;
  box-shadow:0 0 15px #00f0ff;
}

/* ANIMASI */
.fade{animation:fade 0.6s;}
@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>ログイン (Login)</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn blue" onclick="login()">Masuk</button>
  </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    <b>WarnetKu (ワーネット)</b>
  </div>

  <div class="menu">
    <div onclick="showPage('booking')">🎮 Booking</div>
    <div onclick="showPage('kasir')">💸 Kasir</div>
    <div onclick="showPage('laporan')">📊 Laporan</div>
    <div onclick="logout()">🚪 Logout</div>
  </div>
</div>

<div class="content">

<!-- BOOKING -->
<div id="bookingPage" class="card fade">
  <h3>🎮 Booking PC</h3>

  <input id="nama" placeholder="Nama User">
  <input id="durasi" type="number" placeholder="Durasi (jam)">

  <p>💰 Harga / jam: Rp 5.000</p>
  <p id="totalHarga">Total: Rp 0</p>

  <div class="pc-grid" id="pcList"></div>

  <button class="btn blue" onclick="booking()">Booking Sekarang</button>
</div>

<!-- KASIR -->
<div id="kasirPage" class="card" style="display:none;">
  <h3>💸 Kasir</h3>
  <ul id="transaksiList"></ul>
  <h4 id="totalUang">Total: Rp 0</h4>
</div>

<!-- LAPORAN -->
<div id="laporanPage" class="card" style="display:none;">
  <h3>📊 Laporan Keuangan</h3>
  <p id="laporanText"></p>
</div>

</div>
</div>

<script>
let selectedPC=null;
let bookings=JSON.parse(localStorage.getItem("bookings"))||{};
let transaksi=JSON.parse(localStorage.getItem("transaksi"))||[];

const hargaPerJam=5000;

function login(){
  loginPage.style.display="none";
  app.style.display="block";
}

function logout(){
  location.reload();
}

function showPage(p){
  bookingPage.style.display="none";
  kasirPage.style.display="none";
  laporanPage.style.display="none";

  if(p==="booking") bookingPage.style.display="block";
  if(p==="kasir") renderKasir(),kasirPage.style.display="block";
  if(p==="laporan") renderLaporan(),laporanPage.style.display="block";
}

durasi.oninput=()=>{
  totalHarga.innerText="Total: Rp "+(durasi.value*hargaPerJam||0);
}

function renderPC(){
  pcList.innerHTML="";
  for(let i=1;i<=12;i++){
    let d=bookings[i];
    let div=document.createElement("div");

    div.className="pc "+(d?"booked":"available");

    if(d){
      div.innerHTML=`PC ${i}<br>${d.nama}<br>⏰ ${d.sisa}s`;
    }else{
      div.innerHTML="PC "+i;
    }

    div.onclick=()=>{
      selectedPC=i;
      renderPC();
    }

    if(selectedPC===i) div.classList.add("selected");

    pcList.appendChild(div);
  }
}

function booking(){
  let namaVal=nama.value;
  let durasiVal=parseInt(durasi.value);

  if(!selectedPC) return alert("Pilih PC!");
  if(!durasiVal) return alert("Isi durasi!");

  let total=durasiVal*hargaPerJam;
  let detik=durasiVal*60;

  bookings[selectedPC]={nama:namaVal,sisa:detik,total:total};

  startTimer(selectedPC);

  nama.value="";
  durasi.value="";
  totalHarga.innerText="Total: Rp 0";
  selectedPC=null;

  save();
  renderPC();
}

function startTimer(pc){
  let interval=setInterval(()=>{
    if(!bookings[pc]) return clearInterval(interval);

    bookings[pc].sisa--;

    if(bookings[pc].sisa<=0){
      alert("⛔ Waktu habis PC "+pc);

      transaksi.push({
        nama:bookings[pc].nama,
        total:bookings[pc].total
      });

      delete bookings[pc];
      clearInterval(interval);
      renderKasir();
      renderLaporan();
    }

    save();
    renderPC();
  },1000);
}

function renderKasir(){
  transaksiList.innerHTML="";
  let total=0;

  transaksi.forEach(t=>{
    let li=document.createElement("li");
    li.innerText=`${t.nama} - Rp ${t.total}`;
    transaksiList.appendChild(li);
    total+=t.total;
  });

  totalUang.innerText="Total: Rp "+total;
}

function renderLaporan(){
  let total=transaksi.reduce((a,b)=>a+b.total,0);
  laporanText.innerText="Total pemasukan: Rp "+total;
}

function save(){
  localStorage.setItem("bookings",JSON.stringify(bookings));
  localStorage.setItem("transaksi",JSON.stringify(transaksi));
}

renderPC();
renderKasir();
renderLaporan();
</script>

</body>
</html>
```
