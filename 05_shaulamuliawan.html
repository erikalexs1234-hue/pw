<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WarnetKu Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:white;}

#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;}
.login-box{background:rgba(255,255,255,0.05);padding:30px;border-radius:15px;width:300px;}

input{width:100%;padding:10px;margin:8px 0;border:none;border-radius:8px;}

.btn{padding:10px;border:none;border-radius:8px;width:100%;cursor:pointer;}
.blue{background:#0ea5e9;}
.green{background:#22c55e;}

#app{display:none;}

.sidebar{width:220px;height:100vh;background:#0f172a;position:fixed;padding:20px;}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
.logo img{width:50px;}

.menu div{padding:10px;cursor:pointer;border-radius:8px;}
.menu div:hover{background:rgba(255,255,255,0.1);}

.content{margin-left:240px;padding:20px;}

.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;}

.pc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;}
.pc{padding:15px;text-align:center;border-radius:10px;cursor:pointer;}
.available{background:#16a34a;}
.booked{background:#dc2626;}
.selected{outline:3px solid cyan;}
</style>
</head>

<body>

<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button class="btn blue" onclick="login()">Login</button>
  </div>
</div>

<div id="app">

<div class="sidebar">
  <div class="logo">
    <img src="logo.png">
    <b>WarnetKu</b>
  </div>
</div>

<div class="content">
<div class="card">

<h3>Booking PC</h3>

<input id="nama" placeholder="Nama">
<input id="durasi" type="number" placeholder="Durasi (jam)">
<p>Harga / jam: Rp 5.000</p>
<p id="totalHarga">Total: Rp 0</p>

<div class="pc-grid" id="pcList"></div>

<button class="btn blue" onclick="booking()">Booking</button>

</div>
</div>

</div>

<script>
let selectedPC=null;
let bookings=JSON.parse(localStorage.getItem("bookings"))||{};
const hargaPerJam=5000;

/* LOGIN */
function login(){
  loginPage.style.display="none";
  app.style.display="block";
}

/* HITUNG HARGA */
durasi.oninput=()=>{
  let d=durasi.value||0;
  totalHarga.innerText="Total: Rp "+(d*hargaPerJam);
}

/* RENDER PC */
function renderPC(){
  pcList.innerHTML="";
  for(let i=1;i<=12;i++){
    let div=document.createElement("div");
    let data=bookings[i];

    div.className="pc "+(data?"booked":"available");

    if(data){
      div.innerHTML=`PC ${i}<br>${data.nama}<br>${data.sisa}s`;
    }else{
      div.innerHTML="PC "+i;
    }

    div.onclick=()=>{
      selectedPC=i;
      renderPC();
    }

    if(selectedPC===i) div.classList.add("selected");

    pcList.appendChild(div);
  }
}

/* BOOKING + TIMER */
function booking(){
  let namaVal=nama.value;
  let durasiVal=parseInt(durasi.value);

  if(!selectedPC) return alert("Pilih PC!");
  if(!durasiVal) return alert("Isi durasi!");

  let totalDetik=durasiVal*60; // demo: 1 jam = 60 detik

  bookings[selectedPC]={
    nama:namaVal,
    sisa:totalDetik
  };

  startTimer(selectedPC);

  // reset form
  nama.value="";
  durasi.value="";
  totalHarga.innerText="Total: Rp 0";
  selectedPC=null;

  save();
  renderPC();
}

/* TIMER */
function startTimer(pc){
  let interval=setInterval(()=>{
    if(!bookings[pc]) return clearInterval(interval);

    bookings[pc].sisa--;

    if(bookings[pc].sisa<=0){
      alert("Waktu habis di PC "+pc+"!");
      delete bookings[pc];
      clearInterval(interval);
    }

    save();
    renderPC();
  },1000);
}

/* SAVE */
function save(){
  localStorage.setItem("bookings",JSON.stringify(bookings));
}

/* INIT */
renderPC();
</script>

</body>
</html>
