<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarnetKu Jepang Edition</title>

<style>
/* === PUNYA KAMU (TIDAK DIUBAH) === */
body{
  margin:0;
  font-family:sans-serif;
  background:
    linear-gradient(rgba(10,10,30,0.4), rgba(10,10,30,0.6)),
    url('tokyo%20japan.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
}

/* TAMBAHAN HUJAN (TIDAK MENGGANGGU) */
#rain{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
}

/* BIAR UI DI ATAS HUJAN */
.sidebar, .main, .login-box{
  position:relative;
  z-index:2;
}
</style>
</head>

<body>

<!-- TAMBAHAN HUJAN -->
<canvas id="rain"></canvas>

<!-- === SEMUA KODE KAMU DI SINI (TIDAK DIUBAH SAMA SEKALI) === -->

<script>
/* TAMBAHAN SCRIPT HUJAN */
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let rainDrops = [];

for(let i=0;i<200;i++){
  rainDrops.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    length: Math.random()*20,
    speed: Math.random()*5+5
  });
}

function drawRain(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="rgba(0,255,255,0.5)";
  ctx.lineWidth=1;

  for(let i=0;i<rainDrops.length;i++){
    let r = rainDrops[i];

    ctx.beginPath();
    ctx.moveTo(r.x,r.y);
    ctx.lineTo(r.x,r.y+r.length);
    ctx.stroke();

    r.y += r.speed;

    if(r.y > canvas.height){
      r.y = 0;
      r.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(drawRain);
}

drawRain();

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
