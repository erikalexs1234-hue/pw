<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarnetKu Jepang Edition</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:
    linear-gradient(rgba(10,10,30,0.4), rgba(10,10,30,0.6)),
    url('tokyo%20japan.jpg');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  color:white;
  overflow:hidden;
}

/* UI */
.sidebar, .main, .login-box{
  position:relative;
  z-index:2;
}

/* LOGIN */
#loginPage{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.login-box{
  background:rgba(20,20,40,0.9);
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
}

.login-box button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg,#00f,#0ff);
  color:white;
}

/* DASHBOARD */
#dashboard{
  display:none;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:rgba(10,10,30,0.9);
  height:100%;
  position:fixed;
  padding:20px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* MAIN */
.main{
  margin-left:240px;
  padding:20px;
}

.card{
  background:rgba(20,20,40,0.7);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

input{
  display:block;
  margin:10px 0;
  padding:10px;
  width:100%;
  border:none;
  border-radius:8px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
}

button:hover{
  opacity:0.8;
  cursor:pointer;
}

.blue{background:blue;color:white;}
.green{background:green;color:white;}

/* PC GRID */
.pc-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.pc{
  padding:10px;
  background:#222;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.pc:hover{
  transform:scale(1.05);
}

.pc.active{
  background:cyan;
  color:black;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="alarmSound">
  <source src="https://www.soundjay.com/buttons/beep-07.mp3">
</audio>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h2>🎮 WarnetKu</h2>
    <button onclick="show('booking')">Booking</button>
    <button onclick="show('kasir')">Kasir</button>
    <button onclick="show('karyawan')">Karyawan</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- BOOKING -->
    <div id="booking" class="card">
      <h3>Booking PC</h3>
      <input id="nama" placeholder="Nama">
      <input id="durasi" type="number" placeholder="Durasi (jam)">
      
      <div class="pc-grid" id="pcList"></div>
      <button class="blue" onclick="booking()">Booking</button>
      <p id="notif"></p>

      <!-- DASHBOARD HARGA -->
      <div style="margin-top:20px;">
        <h4>Daftar Harga Billing</h4>
        <table style="width:100%;">
          <tr><th>Durasi</th><th>Harga</th></tr>
          <tr><td>1 Jam</td><td>Rp 5.000</td></tr>
          <tr><td>2 Jam</td><td>Rp 9.000</td></tr>
          <tr><td>3 Jam</td><td>Rp 13.000</td></tr>
        </table>
      </div>
    </div>

    <!-- KASIR -->
    <div id="kasir" class="card" style="display:none;">
      <h3>Kasir</h3>
      <button class="green" onclick="bayar()">Bayar Semua</button>
      <p id="totalUang">Total: Rp 0</p>
    </div>

    <!-- KARYAWAN -->
    <div id="karyawan" class="card" style="display:none;">
      <h3>Data Karyawan</h3>
      <input id="namaKaryawan" placeholder="Nama Karyawan">
      <button class="blue" onclick="tambahKaryawan()">Tambah</button>
      <ul id="listKaryawan"></ul>
    </div>

  </div>
</div>

<script>
let selectedPC=null;
let harga=5000;

let dataPC = JSON.parse(localStorage.getItem("pc")) || {};
let dataKaryawan = JSON.parse(localStorage.getItem("karyawan")) || [];
let totalPendapatan = localStorage.getItem("totalUang") || 0;

/* LOGIN */
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="123"){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("dashboard").style.display="block";
    renderPC();
    renderKaryawan();
    updateTotal();
  }else{
    alert("Login gagal!");
  }
}

function logout(){ location.reload(); }

function show(page){
  document.getElementById("booking").style.display="none";
  document.getElementById("kasir").style.display="none";
  document.getElementById("karyawan").style.display="none";
  document.getElementById(page).style.display="block";
}

/* PC */
let pcList=document.getElementById("pcList");

function renderPC(){
  pcList.innerHTML="";
  for(let i=1;i<=8;i++){
    let div=document.createElement("div");
    div.className="pc";

    let data = dataPC[i];
    let status = data?.status || "Kosong";

    div.innerHTML = `
      PC ${i}<br>
      <small>${status}</small><br>
      <small id="timer${i}"></small>
    `;

    if(status==="Dipakai"){
      div.classList.add("active");
      startTimer(i);
    }

    div.onclick=()=>{
      if(status==="Dipakai"){
        document.getElementById("notif").innerText="PC sedang dipakai!";
        return;
      }

      document.querySelectorAll(".pc").forEach(p=>p.classList.remove("active"));
      div.classList.add("active");
      selectedPC=i;
    };

    pcList.appendChild(div);
  }
}

/* BOOKING */
function booking(){
  let nama=document.getElementById("nama").value;
  let durasi=document.getElementById("durasi").value;

  if(!nama || !selectedPC || !durasi){
    document.getElementById("notif").innerText="Lengkapi data!";
    return;
  }

  let end = new Date().getTime() + (durasi * 3600000);
  let biaya = durasi * harga;

  dataPC[selectedPC]={
    nama,
    end,
    durasi,
    biaya,
    status:"Dipakai"
  };

  localStorage.setItem("pc", JSON.stringify(dataPC));
  renderPC();

  document.getElementById("notif").innerText=
    "Booking PC "+selectedPC+" | Rp "+biaya;

  selectedPC=null;
}

/* TIMER + ALARM */
function startTimer(pc){
  let interval = setInterval(()=>{
    if(!dataPC[pc]) return;

    let now = new Date().getTime();
    let sisa = Math.floor((dataPC[pc].end - now)/1000);

    if(sisa <= 0){
      clearInterval(interval);

      totalPendapatan = parseInt(totalPendapatan) + dataPC[pc].biaya;
      localStorage.setItem("totalUang", totalPendapatan);

      document.getElementById("alarmSound").play();

      document.getElementById("notif").innerText =
        "Waktu PC "+pc+" habis!";

      delete dataPC[pc];
      localStorage.setItem("pc", JSON.stringify(dataPC));
      renderPC();
      updateTotal();
      return;
    }

    let jam = Math.floor(sisa/3600);
    let menit = Math.floor((sisa%3600)/60);
    let detik = sisa%60;

    let el=document.getElementById("timer"+pc);
    if(el){
      el.innerText = jam+"j "+menit+"m "+detik+"s";
    }
  },1000);
}

/* KASIR */
function bayar(){
  let total=0;
  for(let pc in dataPC){
    total += dataPC[pc].biaya || harga;
  }

  totalPendapatan = parseInt(totalPendapatan) + total;
  localStorage.setItem("totalUang", totalPendapatan);

  document.getElementById("notif").innerText =
    "Pembayaran berhasil Rp "+total;

  dataPC={};
  localStorage.setItem("pc", JSON.stringify(dataPC));
  renderPC();
  updateTotal();
}

/* TOTAL */
function updateTotal(){
  let el = document.getElementById("totalUang");
  if(el){
    el.innerText = "Total: Rp " + totalPendapatan;
  }
}

/* KARYAWAN */
function tambahKaryawan(){
  let nama=document.getElementById("namaKaryawan").value;
  if(!nama) return;

  dataKaryawan.push(nama);
  localStorage.setItem("karyawan", JSON.stringify(dataKaryawan));
  renderKaryawan();
  document.getElementById("namaKaryawan").value="";
}

function renderKaryawan(){
  let list=document.getElementById("listKaryawan");
  list.innerHTML="";

  dataKaryawan.forEach((k,i)=>{
    let li=document.createElement("li");
    li.innerText=k;

    li.onclick=()=>{
      dataKaryawan.splice(i,1);
      localStorage.setItem("karyawan", JSON.stringify(dataKaryawan));
      renderKaryawan();
    };

    list.appendChild(li);
  });
}

window.onload=()=>{
  renderPC();
  renderKaryawan();
  updateTotal();
};
</script>

</body>
</html>
