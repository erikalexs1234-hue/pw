<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>WarnetKu Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b;
  --primary:#6366f1; --primary2:#4f46e5;
  --danger:#ef4444; --warn:#f59e0b; --border:#e2e8f0;
}
body.dark{
  --bg:#0b1220; --card:#0f172a; --text:#e5e7eb; --muted:#94a3b8;
  --primary:#818cf8; --primary2:#6366f1;
  --danger:#f87171; --warn:#fbbf24; --border:#1f2937;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text)}

.container{max-width:1000px;margin:auto;padding:20px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}

.logo-wrap{display:flex;align-items:center;gap:10px}
.logo{width:45px;height:45px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.2)}

.btn{padding:10px;border:none;border-radius:8px;cursor:pointer;background:var(--primary);color:#fff;font-weight:600}
.btn:hover{background:var(--primary2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-danger{background:var(--danger)}
.btn-warn{background:var(--warn)}

.card{background:var(--card);padding:15px;border-radius:12px;border:1px solid var(--border);margin-bottom:15px}
.grid{display:grid;gap:10px}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}

input,select{
  padding:12px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--text)
}

.meta{font-size:13px;color:var(--muted)}
.actions{margin-top:10px;display:flex;gap:5px}

.center{min-height:100vh;display:flex;justify-content:center;align-items:center}
.login{width:320px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="center">
  <div class="card login">
    <h2>Login Admin</h2>
    <div class="grid">
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button class="btn" onclick="login()">Login</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="container">

    <div class="topbar">
      <div class="logo-wrap">
        <!-- ✅ LOGO BASE64 (SUDAH DIGABUNG) -->
        <img class="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." />
        <h1>WarnetKu Dashboard</h1>
      </div>

      <div style="display:flex;gap:8px">
        <button class="btn-ghost btn" onclick="toggleDark()">🌙</button>
        <button class="btn-ghost btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <input type="text" id="search" class="card" placeholder="Cari nama / NIM...">

    <div class="card">
      <h3>Tambah / Edit</h3>
      <div class="grid">
        <input type="text" id="nim" placeholder="NIM">
        <input type="text" id="nama" placeholder="Nama">
        <input type="number" id="umur" placeholder="Umur">
        <select id="jurusan">
          <option value="">Pilih Jurusan</option>
          <option>Informatika</option>
          <option>Sistem Informasi</option>
          <option>Manajemen</option>
          <option>Akuntansi</option>
        </select>
        <button id="submitBtn" class="btn">Tambah</button>
      </div>
    </div>

    <div id="userList" class="list"></div>
  </div>
</div>

<script>
// LOGIN
const ADMIN={user:"admin",pass:"123"};
const login=()=>{
  if(username.value===ADMIN.user && password.value===ADMIN.pass){
    localStorage.setItem("login","true");init();
  }else alert("Login gagal!");
};
const logout=()=>{localStorage.removeItem("login");init();};

// DARK MODE
const toggleDark=()=>{
  const d=localStorage.getItem("dark")==="true";
  localStorage.setItem("dark",(!d));applyTheme();
};
const applyTheme=()=>document.body.classList.toggle("dark",localStorage.getItem("dark")==="true");

// DATA
let users=JSON.parse(localStorage.getItem("data"))||[];
let editId=null;
const save=()=>localStorage.setItem("data",JSON.stringify(users));

// CRUD
const saveUser=()=>{
  const nim=nimInput.value,nama=namaInput.value,umur=umurInput.value,jurusan=jurusanInput.value;
  if(!nim||!nama||!umur||!jurusan)return alert("Lengkapi!");

  if(editId){
    users=users.map(u=>u.id===editId?{...u,nim,nama,umur,jurusan}:u);
    editId=null;submitBtn.innerText="Tambah";
  }else{
    users.push({id:Date.now()+"",nim,nama,umur,jurusan});
  }
  save();clear();render();
};

const deleteUser=id=>{users=users.filter(u=>u.id!==id);save();render();};

const editUser=id=>{
  const u=users.find(x=>x.id===id);
  nimInput.value=u.nim;
  namaInput.value=u.nama;
  umurInput.value=u.umur;
  jurusanInput.value=u.jurusan;
  editId=id;
  submitBtn.innerText="Update";
};

// RENDER
const render=(data=users)=>{
  userList.innerHTML=data.length?data.map(u=>`
  <div class="card">
    <h3>${u.nama}</h3>
    <div class="meta">NIM: ${u.nim}</div>
    <div class="meta">Umur: ${u.umur}</div>
    <div class="meta">Jurusan: ${u.jurusan}</div>
    <div class="actions">
      <button class="btn-warn btn" onclick="editUser('${u.id}')">Edit</button>
      <button class="btn-danger btn" onclick="deleteUser('${u.id}')">Hapus</button>
    </div>
  </div>`).join(""):"<p>Tidak ada data</p>";
};

// SEARCH
search.oninput=e=>{
  const k=e.target.value.toLowerCase();
  render(users.filter(u=>u.nama.toLowerCase().includes(k)||u.nim.includes(k)));
};

// UTILS
const clear=()=>{nimInput.value="";namaInput.value="";umurInput.value="";jurusanInput.value="";};

// INIT
const init=()=>{
  applyTheme();
  if(localStorage.getItem("login")==="true"){
    loginPage.style.display="none";app.style.display="block";render();
  }else{
    loginPage.style.display="flex";app.style.display="none";
  }
};

const nimInput=document.getElementById("nim");
const namaInput=document.getElementById("nama");
const umurInput=document.getElementById("umur");
const jurusanInput=document.getElementById("jurusan");
const submitBtn=document.getElementById("submitBtn");

submitBtn.onclick=saveUser;
init();
</script>

</body>
</html>
